1面

感想  
・何気にファミコンのローンチタイトル  
・ステージ自体は4種類で、無限ループするタイプのゲーム  
・エンディングは在って無いようなもの  
・マリオが死んだような演出があるおったまげエンド  
・2面ステージが一番難しく、最終(4面)ステージが一番簡単  
・ボリュームが少なく、難易度も低くてサクッとプレイできる  
・ファミコンという8bitのレトロゲーム機のソフトということもあってシンプルなゲーム性  
・他に特筆すべきことはないかも
