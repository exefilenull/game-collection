<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>ハードウェア詳細</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="scripts/data-store.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fffacd;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .chart-container {
            width: 60%;
            margin: 20px auto;
        }

        table {
            width: 80%;
            background-color: #ffffff;
            margin: 20px auto;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: #333;
            color: white;
        }
        
        .highlight-old {
            background-color: #f4f466;
        }

        .highlight-new {
            background-color: #f78562;
        }

        .highlight-both {
            background-color: #5286f7;
        }

        .controls-container {
            width: 80%;
            margin: 20px auto;
            text-align: center;
        }

        .controls-container label {
            margin: 0 10px;
        }

        .controls-container select {
            padding: 4px 8px;
            font-family: Arial, sans-serif;
        }
    </style>
</head>

<body>
    <h1 id="hardware-title">ハードウェア詳細</h1>
    <div class="chart-container">
        <canvas id="hardwareChart"></canvas>
    </div>

    <div class="controls-container" id="sort-controls">
        <label for="sort-key-select">並び替え項目:</label>
        <select id="sort-key-select">
            <option value="title">タイトル</option>
            <option value="release_day" selected>発売日</option>
            <option value="genre">ジャンル</option>
            <option value="collected">収集状況</option>
            <option value="favorite">お気に入り</option>
        </select>

        <label for="sort-order-select">順序:</label>
        <select id="sort-order-select">
            <option value="asc" selected>昇順</option>
            <option value="desc">降順</option>
        </select>
    </div>

    <div class="controls-container" id="filter-controls">
        <label for="filter-collected-select">収集状況:</label>
        <select id="filter-collected-select">
            <option value="all" selected>すべて</option>
            <option value="collected">収集済み</option>
            <option value="uncollected">未収集</option>
        </select>

        <label for="filter-cleared-select">クリア状況:</label>
        <select id="filter-cleared-select">
            <option value="all" selected>すべて</option>
            <option value="cleared">クリア済み</option>
            <option value="uncleared">未クリア</option>
        </select>

        <label for="filter-dontcollect-checkbox">
            <input type="checkbox" id="filter-dontcollect-checkbox">
            収集不要のみ
        </label>

        <label for="filter-favorite-checkbox">
            <input type="checkbox" id="filter-favorite-checkbox">
            お気に入りのみ
        </label>
    </div>

    <p id="empty-state" style="display:none; text-align:center;">該当するゲームがありません</p>

    <table id="game-table">
        <thead>
            <tr>
                <th>タイトル</th>
                <th>ジャンル</th>
                <th>収集状況(新品)</th>
                <th>収集状況(中古)</th>
                <th>発売日</th>
                <th>クリア済み</th>
                <th>収集不要</th>
                <th>お気に入り</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <!-- 保存ボタン追加 -->
    <button class="save-button" id="saveBtn">GitHubに保存</button>

    <script>
        // ソート・絞り込み設定をブラウザに保存/復元する永続化ヘルパー
        // (design.md #PreferenceStore: DOM操作を行わず、currentGames等のページ固有の状態を保持しない)
        const PreferenceStore = (function () {
            const STORAGE_KEY = 'gameCollectionHardwareDetailPreference';

            // 記憶された値が存在しない・不正な場合のフォールバック先(2.5, 3.6)
            const DEFAULT_PREFERENCE = {
                sortKey: 'release_day',
                sortOrder: 'asc',
                filters: {
                    collectionStatus: 'all',
                    clearStatus: 'all',
                    dontCollectOnly: false,
                    favoriteOnly: false
                }
            };

            // #sort-key-select / #sort-order-select / #filter-collected-select / #filter-cleared-select の
            // option value属性と一致させる(hardware_detail.htmlのUI定義を単一の真実の源とする)
            const VALID_SORT_KEYS = ['title', 'release_day', 'genre', 'collected', 'favorite'];
            const VALID_SORT_ORDERS = ['asc', 'desc'];
            const VALID_COLLECTION_STATUS = ['all', 'collected', 'uncollected'];
            const VALID_CLEAR_STATUS = ['all', 'cleared', 'uncleared'];

            function cloneDefault() {
                return {
                    sortKey: DEFAULT_PREFERENCE.sortKey,
                    sortOrder: DEFAULT_PREFERENCE.sortOrder,
                    filters: {
                        collectionStatus: DEFAULT_PREFERENCE.filters.collectionStatus,
                        clearStatus: DEFAULT_PREFERENCE.filters.clearStatus,
                        dontCollectOnly: DEFAULT_PREFERENCE.filters.dontCollectOnly,
                        favoriteOnly: DEFAULT_PREFERENCE.filters.favoriteOnly
                    }
                };
            }

            // 保存値の形状・既知の値との一致を検証する。1つでも不一致なら不正値として扱う
            function isValidPreferenceShape(value) {
                if (!value || typeof value !== 'object') return false;
                if (VALID_SORT_KEYS.indexOf(value.sortKey) === -1) return false;
                if (VALID_SORT_ORDERS.indexOf(value.sortOrder) === -1) return false;

                const filters = value.filters;
                if (!filters || typeof filters !== 'object') return false;
                if (VALID_COLLECTION_STATUS.indexOf(filters.collectionStatus) === -1) return false;
                if (VALID_CLEAR_STATUS.indexOf(filters.clearStatus) === -1) return false;
                if (typeof filters.dontCollectOnly !== 'boolean') return false;
                if (typeof filters.favoriteOnly !== 'boolean') return false;

                return true;
            }

            // 単一のブラウザローカルキーにJSON文字列化して保存する。
            // localStorageが利用できない環境(プライベートブラウジング等)では例外を吸収し、何もしない
            function save(preference) {
                try {
                    window.localStorage.setItem(STORAGE_KEY, JSON.stringify(preference));
                } catch (error) {
                    // ストレージ利用不可時は静かに諦める(design.md Error Handling: ユーザー通知は行わない)
                }
            }

            // 保存されたJSONを読み込み、パースして返す。
            // ストレージ利用不可・値が存在しない・パース失敗・形状不一致のいずれの場合も既定値を返す
            function load() {
                try {
                    const raw = window.localStorage.getItem(STORAGE_KEY);
                    if (!raw) return cloneDefault();

                    const parsed = JSON.parse(raw);
                    if (!isValidPreferenceShape(parsed)) return cloneDefault();

                    return {
                        sortKey: parsed.sortKey,
                        sortOrder: parsed.sortOrder,
                        filters: {
                            collectionStatus: parsed.filters.collectionStatus,
                            clearStatus: parsed.filters.clearStatus,
                            dontCollectOnly: parsed.filters.dontCollectOnly,
                            favoriteOnly: parsed.filters.favoriteOnly
                        }
                    };
                } catch (error) {
                    return cloneDefault();
                }
            }

            return {
                DEFAULT_PREFERENCE: cloneDefault(),
                save: save,
                load: load
            };
        })();

        const graphColors = {
            "全体": ['#000000', '#ccc'],        // 全体の色
            "任天堂": ['#ff0000', '#ccc'],        // 任天堂の色
            "SNK": ['#FF8C00', '#ccc'],        // SNKの色
            "NEC": ['#ffff00', '#ccc'],        // NECの色
            "エポック": ['#ADFF2F', '#ccc'],        // エポックの色
            "Microsoft": ['#00CC00', '#ccc'],  // Microsoftの色
            "BANDAI": ['#06FECF', '#ccc'],        // BANDAIの色
            "SEGA": ['#00BFFF', '#ccc'],        // SEGAの色
            "SIE": ['#0033FF', '#ccc'],        // SIEの色
            "Panasonic": ['#9900FF', '#ccc'],   // Panasonicの色
            "CASIO": ['#FF3399', '#ccc'],        // CASIOの色
            "ASCII": ['#C47600', '#ccc'],        // ASCIIの色
            "Tomy": ['#99FFCC', '#ccc']        // Tomyの色
        };

        const urlParams = new URLSearchParams(window.location.search);
        const hardwareName = urlParams.get('hardware');
        const categoryName = urlParams.get('category');

        let currentGames = []; // ← 現在読み込んだデータを保持
        let originalDontCollect = {};
        let originalFavorite = {};
        let sourceJsonFile = null;
        // 保存対象ファイル全体({category, hardware_name})。同じカテゴリファイルには
        // 他のハードウェアのデータも含まれるため、保存時にcurrentGamesだけを送ると
        // それらを消してしまう。必ずこのオブジェクトを介してファイル全体を再構築して送る
        let sourceCategoryData = null;
        const saveBtn = document.getElementById('saveBtn');
        const sortKeySelect = document.getElementById('sort-key-select');
        const sortOrderSelect = document.getElementById('sort-order-select');
        const filterCollectedSelect = document.getElementById('filter-collected-select');
        const filterClearedSelect = document.getElementById('filter-cleared-select');
        const filterDontCollectCheckbox = document.getElementById('filter-dontcollect-checkbox');
        const filterFavoriteCheckbox = document.getElementById('filter-favorite-checkbox');

        if (saveBtn) saveBtn.disabled = true;

        // ソートキーごとの比較ロジック(収集状況は複合スコアで判定)
        function compareGames(a, b, key) {
            switch (key) {
                case 'title':
                    return (a.soft_title || '').localeCompare(b.soft_title || '');
                case 'genre':
                    return (a.game_category || '').localeCompare(b.game_category || '');
                case 'collected': {
                    // 収集状況の複合スコア: 新品・中古どちらも収集済み(2点) > いずれか一方収集済み(1点) > 未収集(0点)
                    const scoreA = (a.collected_new ? 1 : 0) + (a.collected_old ? 1 : 0);
                    const scoreB = (b.collected_new ? 1 : 0) + (b.collected_old ? 1 : 0);
                    return scoreA - scoreB;
                }
                case 'favorite': {
                    const favA = a.favorite ? 1 : 0;
                    const favB = b.favorite ? 1 : 0;
                    return favA - favB;
                }
                case 'release_day':
                default:
                    return new Date(a.release_day) - new Date(b.release_day);
            }
        }

        // currentGamesを破壊的に変更せず、選択中のソートキー/順序で並び替えた新しい配列を返す
        function applySort(games) {
            const key = sortKeySelect ? sortKeySelect.value : 'release_day';
            const order = sortOrderSelect ? sortOrderSelect.value : 'asc';
            const direction = order === 'desc' ? -1 : 1;

            return [...games].sort((a, b) => direction * compareGames(a, b, key));
        }

        // 選択中の絞り込み条件(収集状況/クリア状況/収集不要のみ/お気に入りのみ)をAND結合で適用し、
        // 引数の配列を破壊的に変更せず新しい配列を返す(Filter Semantics: design.md参照)
        function applyFilters(games) {
            const collectedValue = filterCollectedSelect ? filterCollectedSelect.value : 'all';
            const clearedValue = filterClearedSelect ? filterClearedSelect.value : 'all';
            const dontCollectOnly = filterDontCollectCheckbox ? filterDontCollectCheckbox.checked : false;
            const favoriteOnly = filterFavoriteCheckbox ? filterFavoriteCheckbox.checked : false;

            return games.filter(game => {
                const isCollected = !!(game.collected_new || game.collected_old);
                if (collectedValue === 'collected' && !isCollected) return false;
                if (collectedValue === 'uncollected' && isCollected) return false;

                const isCleared = !!game.game_cleared;
                if (clearedValue === 'cleared' && !isCleared) return false;
                if (clearedValue === 'uncleared' && isCleared) return false;

                if (dontCollectOnly && game.dont_collect !== true) return false;
                if (favoriteOnly && game.favorite !== true) return false;

                return true;
            });
        }

        // currentGames(真実の源)から絞り込み→並び替え済みのビューを生成してテーブルを再描画する
        // (イベントもdisplayTable内で再バインドされる)。currentGames自体は変更しない
        function renderView() {
            const filteredView = applyFilters(currentGames);
            const view = applySort(filteredView);

            displayTable(view);

            const emptyState = document.getElementById('empty-state');
            if (emptyState) {
                emptyState.style.display = view.length === 0 ? '' : 'none';
            }
        }

        // 現在の6コントロールの値からPreferenceStoreが扱う設定オブジェクトを組み立てる(save呼び出しで共通利用)
        function getCurrentPreference() {
            return {
                sortKey: sortKeySelect ? sortKeySelect.value : PreferenceStore.DEFAULT_PREFERENCE.sortKey,
                sortOrder: sortOrderSelect ? sortOrderSelect.value : PreferenceStore.DEFAULT_PREFERENCE.sortOrder,
                filters: {
                    collectionStatus: filterCollectedSelect ? filterCollectedSelect.value : PreferenceStore.DEFAULT_PREFERENCE.filters.collectionStatus,
                    clearStatus: filterClearedSelect ? filterClearedSelect.value : PreferenceStore.DEFAULT_PREFERENCE.filters.clearStatus,
                    dontCollectOnly: filterDontCollectCheckbox ? filterDontCollectCheckbox.checked : PreferenceStore.DEFAULT_PREFERENCE.filters.dontCollectOnly,
                    favoriteOnly: filterFavoriteCheckbox ? filterFavoriteCheckbox.checked : PreferenceStore.DEFAULT_PREFERENCE.filters.favoriteOnly
                }
            };
        }

        // ソート・絞り込みコントロール変更時に再描画し、選択状態をPreferenceStoreへ保存する(2.4, 2.5, 3.5, 3.6)
        function handlePreferenceControlChange() {
            renderView();
            PreferenceStore.save(getCurrentPreference());
        }

        if (sortKeySelect) sortKeySelect.addEventListener('change', handlePreferenceControlChange);
        if (sortOrderSelect) sortOrderSelect.addEventListener('change', handlePreferenceControlChange);

        if (filterCollectedSelect) filterCollectedSelect.addEventListener('change', handlePreferenceControlChange);
        if (filterClearedSelect) filterClearedSelect.addEventListener('change', handlePreferenceControlChange);
        if (filterDontCollectCheckbox) filterDontCollectCheckbox.addEventListener('change', handlePreferenceControlChange);
        if (filterFavoriteCheckbox) filterFavoriteCheckbox.addEventListener('change', handlePreferenceControlChange);

        document.addEventListener("DOMContentLoaded", () => {
            if (!hardwareName) {
                alert('ハードウェア名が指定されていません。');
                return;
            }

            document.getElementById('hardware-title').textContent = `${hardwareName} の詳細`;

            const jsonFiles = DataStoreModule.CATEGORY_JSON_FILES;

            DataStoreModule.fetchAllCategoryData()
                .then(jsonDataArray => {
                    const games = extractHardwareData(jsonDataArray, jsonFiles, hardwareName) || [];
                    currentGames = games; // ← 保存用に保持

                    originalDontCollect = {};
                    originalFavorite = {};
                    currentGames.forEach(g => {
                        originalDontCollect[g.soft_title] = !!g.dont_collect;
                        originalFavorite[g.soft_title] = !!g.favorite;
                    });

                    displayChart(games);

                    // 保存済みのソート・絞り込み設定を最初の描画前にコントロールへ復元する(2.4, 2.5, 3.5, 3.6)
                    // 保存値が無い・不正な場合はPreferenceStore.load()がDEFAULT_PREFERENCEを返すため、
                    // 既定のソート(発売日昇順)・絞り込み無し(UIのselected属性と一致)がそのまま適用される
                    const restoredPreference = PreferenceStore.load();
                    if (sortKeySelect) sortKeySelect.value = restoredPreference.sortKey;
                    if (sortOrderSelect) sortOrderSelect.value = restoredPreference.sortOrder;
                    if (filterCollectedSelect) filterCollectedSelect.value = restoredPreference.filters.collectionStatus;
                    if (filterClearedSelect) filterClearedSelect.value = restoredPreference.filters.clearStatus;
                    if (filterDontCollectCheckbox) filterDontCollectCheckbox.checked = restoredPreference.filters.dontCollectOnly;
                    if (filterFavoriteCheckbox) filterFavoriteCheckbox.checked = restoredPreference.filters.favoriteOnly;

                    renderView(); // 復元(または既定)されたソート・絞り込み設定を適用して初回描画

                    if (saveBtn) {
                        saveBtn.disabled = true;
                        saveBtn.classList.remove("active");
                    }
                })
                .catch(error => console.error('JSONの読み込みエラー:', error));
        });

        function extractHardwareData(jsonDataArray, jsonFiles, hardwareName) {
            for (let i = 0; i < jsonDataArray.length; i++){
                const data = jsonDataArray[i];

                for (const [hardTitle, games] of Object.entries(data.hardware_name)){
                    if (hardTitle === hardwareName) {
                        sourceJsonFile = jsonFiles[i];
                        sourceCategoryData = data;
                        return games;
                    }
                }
            }
            //for (const data of jsonDataArray) {
            //    for (const [hardTitle, games] of Object.entries(data.hardware_name)) {
            //        if (hardTitle === hardwareName) {
            //            return games;
            //        }
            //    }
            //}
            return [];
        }

        function displayChart(games) {
            const collectedCountNew = games.filter(game => game.collected_new).length;
            const collectedCountOld = games.filter(game => game.collected_old).length;
            
            const totalCount = games.length;
            const categoryColor = graphColors[categoryName] || ["#000000", "#ccc"]

            new Chart(document.getElementById('hardwareChart'), {
                type: 'doughnut',
                data: {
                    labels: ['収集済み', '未収集'],
                    datasets: [{
                        label: '新品データ',
                        data: [collectedCountNew, totalCount - collectedCountNew],
                        backgroundColor: [categoryColor[0], categoryColor[1]],
                        hoverOffset: 4,
                        cutout: '50%',
                        animation: {
                            duration: 3000
                        }
                    }, {
                        label: '中古データ',
                        data: [collectedCountOld, totalCount - collectedCountOld],
                        backgroundColor: ['#fffacd', categoryColor[0]],
                        hoverOffset: 4,
                        cutout: '50%',
                        animation: {
                            duration: 4000
                        }
                    }]
                },
                options: {
                    animation: {
                        duration: 2000
                    }
                }
            });
        }

        function displayTable(games) {
            const tbody = document.querySelector('#game-table tbody');
            tbody.innerHTML = '';

            // 絞り込み・ソートは呼び出し元(renderView→applyFilters→applySort)の責務。ここでは受け取った順序をそのまま描画する。
            games.forEach(game => {
                const row = document.createElement('tr');
                row.classList.remove('highlight', 'highlight-new', 'highlight-old', 'highlight-both');

                if (game.collected_new && game.collected_old) {
                    row.classList.add('highlight-both');
                } else if (game.collected_new) {
                    row.classList.add('highlight-new');
                } else if (game.collected_old) {
                    row.classList.add('highlight-old');
                }

                console.log(
                    "TITLE:", game.soft_title,
                    "N:", game.collected_new,
                    "O:", game.collected_old,
                    "CLASS:", row.classList.value
                );

                const clearedCell = game.game_cleared
                    ? `<a href="game_clear/${categoryName}/${hardwareName}/${game.game_cleared}.html">クリア済み</a>`
                    : '未クリア';

                row.innerHTML = `
                    <td class="game-title">${DataStoreModule.escapeHtml(game.soft_title)}</td>
                    <td>${DataStoreModule.escapeHtml(game.game_category || '')}</td>
                    <td class="toggle-new">${game.collected_new ? '収集済み' : '未収集'}</td>
                    <td class="toggle-old">${game.collected_old ? '収集済み' : '未収集'}</td>
                    <td>${DataStoreModule.escapeHtml(game.release_day || '不明')}</td>
                    <td>${clearedCell}</td>
                    <td class="toggle-ignore">${game.dont_collect ? '不要' : '必要'}</td>
                    <td class="toggle-favorite">${!!game.favorite ? '★' : '☆'}</td>
                `;

                tbody.appendChild(row);
            });

            // ★ クリックイベント：ゲーム名で突き合わせる
            tbody.querySelectorAll('.toggle-new').forEach(cell => {
                cell.addEventListener('click', () => {
                    const row = cell.closest('tr');
                    const title = row.querySelector('.game-title').textContent.trim();

                    const game = currentGames.find(g => g.soft_title === title);
                    if (!game) return;

                    game.collected_new = !game.collected_new;
                    cell.textContent = game.collected_new ? '収集済み' : '未収集';

                    markChanged();
                });
            });

            tbody.querySelectorAll('.toggle-old').forEach(cell => {
                cell.addEventListener('click', () => {
                    const row = cell.closest('tr');
                    const title = row.querySelector('.game-title').textContent.trim();

                    const game = currentGames.find(g => g.soft_title === title);
                    if (!game) return;

                    game.collected_old = !game.collected_old;
                    cell.textContent = game.collected_old ? '収集済み' : '未収集';

                    markChanged();
                });
            });

            tbody.querySelectorAll('.toggle-ignore').forEach(cell => {
                cell.addEventListener('click', () => {
                    const row = cell.closest('tr');
                    const title = row.querySelector('.game-title').textContent.trim();

                    const game = currentGames.find(g => g.soft_title === title);
                    if (!game) return;

                    game.dont_collect = !game.dont_collect;
                    cell.textContent = game.dont_collect ? '不要' : '必要';

                    markChanged();
                });
            });

            tbody.querySelectorAll('.toggle-favorite').forEach(cell => {
                cell.addEventListener('click', () => {
                    const row = cell.closest('tr');
                    const title = row.querySelector('.game-title').textContent.trim();

                    const game = currentGames.find(g => g.soft_title === title);
                    if (!game) return;

                    game.favorite = !game.favorite;
                    cell.textContent = game.favorite ? '★' : '☆';

                    markChanged();
                });
            });
        }

        // 差分検知してボタン活性化
        function markChanged() {
            // originalDontCollect / originalFavorite に対して currentGames の値を比較
            let changed = false;
            for (const g of currentGames) {
                const originalDC = originalDontCollect[g.soft_title];
                // 原本にキーが無い場合は false とみなす
                const origDCVal = typeof originalDC === 'undefined' ? false : !!originalDC;
                const curDCVal = !!g.dont_collect;
                if (origDCVal !== curDCVal) {
                    changed = true;
                    break;
                }

                const originalFav = originalFavorite[g.soft_title];
                const origFavVal = typeof originalFav === 'undefined' ? false : !!originalFav;
                const curFavVal = !!g.favorite;
                if (origFavVal !== curFavVal) {
                    changed = true;
                    break;
                }
            }

            if (saveBtn) {
                saveBtn.disabled = !changed;
                if (changed) saveBtn.classList.add("active");
                else saveBtn.classList.remove("active");
            }
        }

        // GitHub更新関数
        async function saveToGitHub(updatedData) {
            if (!sourceJsonFile || !sourceCategoryData) {
                alert("更新先のJsonファイルが特定できません。");
                return;
            }

            // 保存対象ファイル全体(同じカテゴリ内の他ハードウェアのデータを含む)を
            // 再構築してから送信する。updatedData(このハードウェアの配列)だけを
            // ファイル全体として送ると、他のハードウェアのデータを消してしまう
            sourceCategoryData.hardware_name[hardwareName] = updatedData;

            const result = await DataStoreModule.saveToGitHub(
                sourceJsonFile,
                JSON.stringify(sourceCategoryData, null, 2),
                `Update ${sourceJsonFile} via WebUI`
            );

            if (result.success) {
                alert("✅ GitHubに保存しました！");

                // originalDontCollect / originalFavorite を currentGames の最新値で上書き
                originalDontCollect = {};
                originalFavorite = {};
                currentGames.forEach(g => {
                    originalDontCollect[g.soft_title] = !!g.dont_collect;
                    originalFavorite[g.soft_title] = !!g.favorite;
                });

                // ボタンを無効にする
                if (saveBtn) {
                    saveBtn.disabled = true;
                    saveBtn.classList.remove("active");
                }
            } else {
                alert("⚠️ エラー: " + (result.error || "保存に失敗しました"));
            }
        }

        // 保存ボタンクリック
        if (saveBtn) {
            saveBtn.addEventListener("click", () => {
                if (currentGames.length === 0) {
                    alert("保存できるデータがありません。");
                    return;
                }
                if (!confirm("このデータをGitHubに保存しますか？")) return;
                saveToGitHub(currentGames);
            });
        }
    </script>

</body>

</html>
